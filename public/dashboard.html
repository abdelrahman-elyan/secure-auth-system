<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Secure Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">

  <nav class="bg-gray-800 p-4 flex justify-between items-center shadow-lg">
    <h1 class="text-white text-xl font-bold">🔐 Secure Auth</h1>
    <div class="flex items-center gap-4">
      <span id="userName" class="text-gray-300 text-sm"></span>
      <span id="userRole" class="bg-blue-600 text-white text-xs px-3 py-1 rounded-full"></span>
      <button onclick="handleLogout()"
        class="bg-red-600 hover:bg-red-700 text-white text-sm px-4 py-2 rounded-lg">
        Logout
      </button>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-8">
    <h2 class="text-3xl font-bold text-white mb-2">Welcome to Dashboard 👋</h2>
    <p id="welcomeMsg" class="text-gray-400 mb-8"></p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Admin Card -->
      <div id="adminCard" class="hidden bg-red-900 border border-red-600 p-6 rounded-2xl">
        <h3 class="text-red-400 text-xl font-bold mb-2">👑 Admin Panel</h3>
        <p class="text-gray-300 text-sm mb-4">Manage all users and system settings</p>
        <button onclick="goTo('/admin.html')"
          class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg">
          Go to Admin
        </button>
      </div>

      <!-- Manager Card -->
      <div id="managerCard" class="hidden bg-yellow-900 border border-yellow-600 p-6 rounded-2xl">
        <h3 class="text-yellow-400 text-xl font-bold mb-2">📊 Manager Panel</h3>
        <p class="text-gray-300 text-sm mb-4">View reports and manage your team</p>
        <button onclick="goTo('/manager.html')"
          class="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-2 rounded-lg">
          Go to Manager
        </button>
      </div>

      <!-- Profile Card -->
      <div class="bg-green-900 border border-green-600 p-6 rounded-2xl">
        <h3 class="text-green-400 text-xl font-bold mb-2">👤 My Profile</h3>
        <p class="text-gray-300 text-sm mb-4">View and manage your profile</p>
        <button onclick="goTo('/profile.html')"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">
          Go to Profile
        </button>
      </div>

    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = '/';
    }

    // عرض بيانات اليوزر
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role.toUpperCase();
    document.getElementById('welcomeMsg').textContent = `Hello ${user.name}! You are logged in as ${user.role}.`;

    // عرض الكارد المناسب حسب الـ Role
    if (user.role === 'admin') {
      document.getElementById('adminCard').classList.remove('hidden');
      document.getElementById('managerCard').classList.remove('hidden');
    } else if (user.role === 'manager') {
      document.getElementById('managerCard').classList.remove('hidden');
    }

    async function goTo(page) {
      window.location.href = page;
    }

    function handleLogout() {
      localStorage.clear();
      window.location.href = '/';
    }
  </script>

</body>
</html>
