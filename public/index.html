<!-- Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Secure Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-white text-center mb-2">🔐 Secure Auth</h2>
    <p class="text-gray-400 text-center mb-6">Sign in to your account</p>

    <div id="errorMsg" class="hidden bg-red-500 text-white p-3 rounded-lg mb-4 text-sm"></div>

    <div class="mb-4">
      <label class="block text-gray-300 mb-2 text-sm">Email</label>
      <input type="email" id="email" placeholder="Enter your email"
        class="w-full bg-gray-700 text-white p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
    </div>

    <div class="mb-6">
      <label class="block text-gray-300 mb-2 text-sm">Password</label>
      <input type="password" id="password" placeholder="Enter your password"
        class="w-full bg-gray-700 text-white p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
    </div>

    <button onclick="handleLogin()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
      Login
    </button>

    <p class="text-gray-400 text-center mt-4 text-sm">
      Don't have an account? 
      <a href="/register.html" class="text-blue-400 hover:underline">Register</a>
    </p>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('hidden');
          return;
        }

        // الباسورد صح → روح لـ 2FA
        localStorage.setItem('tempUserId', data.userId);
        window.location.href = '/verify2fa.html';

      } catch (err) {
        errorMsg.textContent = 'Something went wrong!';
        errorMsg.classList.remove('hidden');
      }
    }
  </script>

</body>
</html>
