<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Secure Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">

  <nav class="bg-gray-800 p-4 flex justify-between items-center shadow-lg">
    <h1 class="text-white text-xl font-bold">👤 My Profile</h1>
    <div class="flex items-center gap-4">
      <span id="userRole" class="bg-green-600 text-white text-xs px-3 py-1 rounded-full"></span>
      <button onclick="window.location.href='/dashboard.html'"
        class="bg-gray-600 hover:bg-gray-700 text-white text-sm px-4 py-2 rounded-lg">
        ← Dashboard
      </button>
      <button onclick="handleLogout()"
        class="bg-red-600 hover:bg-red-700 text-white text-sm px-4 py-2 rounded-lg">
        Logout
      </button>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto p-8">

    <div id="accessDenied" class="hidden bg-red-900 border border-red-600 p-8 rounded-2xl text-center">
      <h2 class="text-4xl mb-4">🚫</h2>
      <h3 class="text-red-400 text-2xl font-bold mb-2">Access Denied</h3>
      <p class="text-gray-400">You don't have permission to view this page.</p>
      <button onclick="window.location.href='/dashboard.html'"
        class="mt-4 bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg">
        Go Back
      </button>
    </div>

    <div id="profileContent" class="hidden">
      <div class="bg-gray-800 border border-green-600 rounded-2xl p-8 text-center mb-6">
        <div class="w-24 h-24 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-4xl">👤</span>
        </div>
        <h2 id="profileName" class="text-2xl font-bold text-white mb-1"></h2>
        <span id="profileRole" class="bg-green-600 text-white text-xs px-3 py-1 rounded-full"></span>
      </div>

      <div class="bg-gray-800 border border-gray-600 rounded-2xl p-6">
        <h3 class="text-white font-bold text-lg mb-4">Account Information</h3>

        <div class="space-y-4">
          <div class="flex justify-between items-center border-b border-gray-700 pb-3">
            <span class="text-gray-400">Full Name</span>
            <span id="infoName" class="text-white font-medium"></span>
          </div>
          <div class="flex justify-between items-center border-b border-gray-700 pb-3">
            <span class="text-gray-400">Email</span>
            <span id="infoEmail" class="text-white font-medium"></span>
          </div>
          <div class="flex justify-between items-center border-b border-gray-700 pb-3">
            <span class="text-gray-400">Role</span>
            <span id="infoRole" class="text-white font-medium capitalize"></span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-gray-400">2FA Status</span>
            <span class="text-green-400 font-medium">✅ Enabled</span>
          </div>
        </div>
      </div>

      <div class="bg-gray-800 border border-gray-600 rounded-2xl p-6 mt-6">
        <h3 class="text-white font-bold text-lg mb-2">🔐 JWT Token</h3>
        <p class="text-gray-400 text-xs mb-3">Your current session token:</p>
        <div class="bg-gray-900 p-3 rounded-lg">
          <p id="tokenDisplay" class="text-green-400 text-xs break-all font-mono"></p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = '/';
    }

    document.getElementById('userRole').textContent = user.role.toUpperCase();

    async function loadPage() {
      try {
        const res = await fetch('/api/profile', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('accessDenied').classList.remove('hidden');
          return;
        }

        document.getElementById('profileContent').classList.remove('hidden');
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileRole').textContent = user.role.toUpperCase();
        document.getElementById('infoName').textContent = user.name;
        document.getElementById('infoEmail').textContent = user.email;
        document.getElementById('infoRole').textContent = user.role;
        document.getElementById('tokenDisplay').textContent = token;

      } catch (err) {
        document.getElementById('accessDenied').classList.remove('hidden');
      }
    }

    loadPage();

    function handleLogout() {
      localStorage.clear();
      window.location.href = '/';
    }
  </script>

</body>
</html>
